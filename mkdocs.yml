site_name: JADX-AI-MCP
site_url: https://jadx-ai-mcp.readthedocs.io
repo_url: https://github.com/zinja-coder/jadx-ai-mcp
repo_name: zinja-coder/jadx-ai-mcp
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Installation: installation.md
  - User guide: user-guide.md
  - API reference: api-reference.md
  - Architecture: architecture.md
  - Java Codebase: java-api.md
  - Python Codebase: python-api.md
  - Examples: examples.md
  - Troubleshooting: troubleshooting.md
  - Contributing: contributing.md
  - License: license.md
  - Changelog: changelog.md
